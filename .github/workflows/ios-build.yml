name: iOS IPA Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'ios-sideload'
        type: choice
        options:
          - ios-sideload
          - development

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🍎 Select Xcode version
        run: |
          # macos-14 da eng so'nggi Xcode ni tanlash
          ls /Applications/Xcode*.app/Contents/Developer 2>/dev/null || echo "Xcode found"
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null || true

      - name: 📱 Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: 🏗️ Build iOS IPA
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile || 'ios-sideload' }} \
            --local \
            --non-interactive \
            --message "GitHub Actions build"
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}

      - name: 📍 Find and copy IPA file
        run: |
          mkdir -p build-output
          echo "Looking for IPA files..."
          find . -name "*.ipa" -type f 2>/dev/null
          IPA_PATH=$(find . -maxdepth 4 -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Trying alternative search..."
            IPA_PATH=$(ls -t build-*/*.ipa 2>/dev/null | head -1)
          fi
          if [ -z "$IPA_PATH" ]; then
            ls -la
            find . -maxdepth 5 -type f \( -name "*.ipa" -o -name "*.xcarchive" \) 2>/dev/null
          fi
          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" build-output/NoorIslam.ipa
            echo "✅ IPA copied to build-output/NoorIslam.ipa"
            ls -lh build-output/NoorIslam.ipa
          else
            echo "⚠️ IPA file not found"
            exit 1
          fi

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorIslam-iOS-IPA
          path: build-output/NoorIslam.ipa
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 📱 iOS Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | ${{ github.event.inputs.profile || 'ios-sideload' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ **IPA fayli** — build tugagach, sahifaning pastki qismidagi \"Artifacts\" bo'limidan yuklab oling." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📲 **Sidestore orqali o'rnatish:**" >> $GITHUB_STEP_SUMMARY
          echo "1. IPA ni telefoningizga yuklab oling" >> $GITHUB_STEP_SUMMARY
          echo "2. Sidestore da \"Open in Sidestore\" orqali o'rnating" >> $GITHUB_STEP_SUMMARY
          echo "3. Settings > General > VPN & Device Management dan Trust qiling" >> $GITHUB_STEP_SUMMARY
