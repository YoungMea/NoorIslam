name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Login to Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🍎 Select Xcode 26 (Swift 6.2)
        run: |
          # Xcode 26.x ni tanlash (Swift 6.2 'apple' package uchun)
          ls /Applications | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_26.3.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.1.1.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.0.1.app 2>/dev/null
          xcodebuild -version

      - name: 📱 Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: 🔍 Debug ios/ contents
        run: |
          echo "=== ios/ directory contents ==="
          find ios -maxdepth 3 -type d 2>/dev/null || echo "ios/ not found"
          echo ""
          echo "=== Workspace files ==="
          find ios -name "*.xcworkspace" -type d 2>/dev/null || echo "No workspace found"
          echo ""
          echo "=== Project files ==="
          find ios -name "*.xcodeproj" -type d 2>/dev/null || echo "No project found"
          echo ""
          echo "=== Podfile ==="
          cat ios/Podfile 2>/dev/null || echo "No Podfile"

      - name: 🔍 Find Xcode workspace and scheme
        id: workspace
        run: |
          # Workspace ni topish (bir nechta nom variantlari)
          WS=$(find ios -name "*.xcworkspace" -type d 2>/dev/null | grep -v "Pods" | head -1)
          # Project ni topish
          PROJ=$(find ios -name "*.xcodeproj" -type d 2>/dev/null | grep -v "Pods" | head -1)
          SCHEME=$(echo "$PROJ" | xargs basename 2>/dev/null | sed 's/\.xcodeproj//')
          
          echo "Found workspace: $WS"
          echo "Found project: $PROJ"
          echo "Scheme: $SCHEME"
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "project=$PROJ" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: 🔧 Install CocoaPods dependencies (no precompile)
        run: |
          cd ios && EXPO_NO_PRECOMPILE=1 pod install || EXPO_NO_PRECOMPILE=1 npx pod-install

      - name: 🔧 Configure Xcode for unsigned build + fix headers
        run: |
          PROJECT=$(find ios -name "project.pbxproj" -type f 2>/dev/null | head -1)
          echo "Configuring: $PROJECT"

          # CODE_SIGN_STYLE = Manual
          sed -i '' 's/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT"
          # CODE_SIGN_IDENTITY = ""
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' "$PROJECT"
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' "$PROJECT"
          # DEVELOPMENT_TEAM = ""
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PROJECT"
          # PROVISIONING_PROFILE = ""
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PROJECT"
          sed -i '' 's/PROVISIONING_PROFILE = [^;]*;/PROVISIONING_PROFILE = "";/g' "$PROJECT"

          echo "✅ Xcode configured for unsigned build"

      - name: 🔧 Copy ExpoModulesCore headers to prebuilt xcframework
        run: |
          # ExpoModulesCore prebuilt xcframeworkda ba'zi headerlar yo'q
          # Barcha headerlarni source'dan xcframeworkga copy qilamiz
          HEADER_SRC="node_modules/expo-modules-core/ios/ExpoModulesCore"
          
          if [ ! -d "$HEADER_SRC" ]; then
            echo "❌ Header source not found at $HEADER_SRC"
            exit 1
          fi
          
          echo "Source headers available:"
          ls "$HEADER_SRC/"*.h 2>/dev/null | wc -l | xargs echo "  .h files:"
          
          # Barcha .xcframework ichidagi Headers papkalariga copy qilamiz
          find ios/Pods/ExpoModulesCore -path "*.framework/Headers" -type d 2>/dev/null | while read DIR; do
            echo "📁 Copying headers to: $DIR"
            cp "$HEADER_SRC/"*.h "$DIR/" 2>/dev/null
            echo "   → $(ls "$DIR/"*.h 2>/dev/null | wc -l | xargs) headers now in framework"
          done
          
          echo "✅ ExpoModulesCore headers copied to all xcframework slices"

      - name: 🏗️ Build .app and create IPA
        run: |
          set -o pipefail

          WS="${{ steps.workspace.outputs.workspace }}"
          SCHEME="${{ steps.workspace.outputs.scheme }}"
          BUILD_DIR="build/derived"

          echo "Building workspace: $WS, scheme: $SCHEME"

          # Workspace bormi yoki project ishlatamiz?
          if [ -n "$WS" ] && [ "$WS" != " " ]; then
            BUILD_TARGET="-workspace \"$WS\""
            echo "Using workspace: $WS"
          else
            BUILD_TARGET="-project \"${{ steps.workspace.outputs.project }}\""
            echo "Using project file directly"
          fi

          eval xcodebuild \
            $BUILD_TARGET \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$BUILD_DIR" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            EXPO_NO_PRECOMPILE=1 \
            | tee build.log

          echo "Build completed with exit code: $?"

      - name: 📦 Package IPA
        run: |
          set -o pipefail
          BUILD_DIR="build/derived"

          # .app faylini topish
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found in $BUILD_DIR"
            echo "Available:"
            find "$BUILD_DIR" -type d -maxdepth 5 2>/dev/null
            exit 1
          fi

          echo "Found .app: $APP_PATH"
          ls -lh "$APP_PATH"

          # IPA yasash (Payload zip)
          mkdir -p build-output Payload
          cp -r "$APP_PATH" Payload/
          cd Payload && zip -rq ../build-output/NoorIslam.ipa . && cd ..
          rm -rf Payload

          echo "✅ IPA created: build-output/NoorIslam.ipa"
          ls -lh build-output/NoorIslam.ipa

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoorIslam-iOS-IPA
          path: build-output/NoorIslam.ipa
          retention-days: 30
          if-no-files-found: error

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 📱 iOS Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Method | xcodebuild .app → zip IPA |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | Unsigned (Sidestore re-signs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ **Artifacts** bo'limidan IPA ni yuklab oling" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📲 **Sidestore:** Apps → + → IPA tanlang → install" >> $GITHUB_STEP_SUMMARY
